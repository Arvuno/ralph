name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flowchart/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: flowchart

      - name: Run build benchmark
        run: time npm run build
        working-directory: flowchart

      - name: Run tests
        run: npm test
        working-directory: flowchart